name: Markdown Check

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main

jobs:
  markdown-basic-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify Markdown files exist
        run: |
          find . -name "*.md" -type f | sort
